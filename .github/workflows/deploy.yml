name: Deploy to Main Site
on:
  push:
    branches:
      - main  # O la rama que uses

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true # Importante para los temas
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to Root Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Necesitarás crear un Personal Access Token (PAT) para esto
          personal_token: ${{ secrets.MY_DEPLOY_TOKEN }}
          external_repository: rdcoronaf/rdcoronaf-web
          publish_dir: ./public
          destination_dir: academic 
          keep_files: true # ¡VITAL! Para que no borre los otros sitios